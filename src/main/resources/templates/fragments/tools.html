<div th:fragment="tools" class="flex flex-col gap-6">
    <div class="card p-6">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-4">Merge CAMT XMLs</h2>
        <p class="text-sm text-gray-400 mb-4">Upload a ZIP file containing multiple CAMT XML bank statements. They will be merged into a single XML file for import.</p>
        <form method="post" action="/dashboard/tools/merge-xml" enctype="multipart/form-data" class="flex gap-4">
            <input type="file" name="file" accept=".zip" class="flex-grow bg-[#0d1117] border border-[#30363d] rounded p-2 text-sm">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
                Merge &amp; Download
            </button>
        </form>
    </div>
</div>

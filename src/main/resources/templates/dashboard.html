<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gemini Torrents Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 0.5rem; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto flex gap-8">
        <!-- Sidebar -->
        <div class="w-80 flex flex-col gap-6">
            <div class="card p-6">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-4">Infrastructure</h2>
                <div id="metrics-container" hx-get="/dashboard/metrics" hx-trigger="every 2s">
                    <div th:replace="~{fragments/metrics :: metrics}"></div>
                </div>
            </div>

            <div class="card p-6 flex-grow">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-4">Registered Tools</h2>
                <ul class="space-y-3">
                    <li th:each="tool : ${tools}" class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <span th:text="${tool.name}" class="font-mono text-sm text-gray-300"></span>
                    </li>
                </ul>
            </div>

            <!-- Navigation -->
            <div class="card p-6">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-4">Navigation</h2>
                <ul class="space-y-2">
                    <li>
                        <button hx-get="/dashboard/torrents" hx-target="#main-content" 
                           class="w-full text-left px-4 py-2 rounded text-sm hover:bg-gray-800 transition-colors flex items-center gap-2">
                           <span class="text-gray-400">⚡</span> Torrents
                        </button>
                    </li>
                    <li>
                        <button hx-get="/dashboard/budget" hx-target="#main-content" 
                           class="w-full text-left px-4 py-2 rounded text-sm hover:bg-gray-800 transition-colors flex items-center gap-2">
                           <span class="text-gray-400">💰</span> Budget
                        </button>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="flex-grow flex flex-col gap-6">
            <div th:replace="~{fragments/logs :: logs}"></div>
        </div>
    </div>
</body>
</html>

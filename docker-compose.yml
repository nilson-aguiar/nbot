  db:
    image: postgres:18
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nbot_password}
      - POSTGRES_DB=${POSTGRES_DB:-nbot}
#    volumes:
#      - ./.docker_data/postgres18:/var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nbot} -d ${POSTGRES_DB:-nbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qbittorrent:
    image: ghcr.io/home-operations/qbittorrent:5.2.0
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    volumes:
      - ./.docker_data/qbittorrent_config:/config
      - ./.docker_data/qbittorrent_downloads:/downloads
    ports:
      - "8090:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

  actual-server:
    image: actualbudget/actual-server:latest
    container_name: actual-server
    ports:
      - "5006:5006"
    volumes:
      - ./.docker_data/actual_data:/data
    restart: unless-stopped

  actual-api:
    image: jhonderson/actual-http-api:latest
    container_name: actual-api
    ports:
      - "5007:5007"
    environment:
      - ACTUAL_SERVER_URL=http://actual-server:5006
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_SERVER_PASSWORD:-actual_password}
      - API_KEY=${ACTUAL_BUDGET_API_KEY:-nbot_secret}
    depends_on:
      - actual-server
    restart: unless-stopped
